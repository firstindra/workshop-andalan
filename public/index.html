<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a19ff" />
  <meta name="description" content="Workshop Andalan - Solusi Teknologi untuk Segala Masalah Anda" />
  
  <!-- Favicon -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  
  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet" 
  />
  
  <!-- SEO Meta Tags -->
  <meta property="og:title" content="Workshop Andalan - Solusi Teknologi" />
  <meta property="og:description" content="Kami adalah bengkel teknologi yang berkomitmen pada inovasi dan solusi kustom." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://workshopandalan.wixsite.com/workshop-andalan" />
  
  <title>Beranda | Workshop Andalan</title>
  
  <style>
    /* Critical CSS - loading state */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading placeholder */
    .app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #ffffff;
    }
    
    .app-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f4f4f4;
      border-top: 3px solid #1a19ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <noscript>
    <div style="text-align:center; padding: 2rem; font-family: sans-serif;">
      <h2>JavaScript diperlukan</h2>
      <p>Anda perlu mengaktifkan JavaScript untuk menjalankan aplikasi ini.</p>
    </div>
  </noscript>

  <!-- Root element untuk React -->
  <div id="root">
    <!-- Loading state sebelum React render -->
    <div class="app-loading">
      <div class="app-loading-spinner"></div>
    </div>
  </div>

  <!-- React akan render di sini -->
</body>
</html>
